plugins:
  - rubocop-rspec
  - rubocop-rails

AllCops:
  TargetRubyVersion: 2.6
  NewCops: enable
  Exclude:
    - "bin/**/*"
    - "vendor/**/*"

# Gem-specific relaxations
Metrics/MethodLength:
  Max: 30
Metrics/ClassLength:
  Max: 200
Metrics/BlockLength:
  Exclude:
    - "spec/**/*"
    - "*.gemspec"
Style/Documentation:
  Enabled: false

# RSpec: allow realistic test structures without artificial splitting
RSpec/MultipleExpectations:
  Enabled: false
RSpec/ExampleLength:
  Enabled: false
RSpec/MultipleMemoizedHelpers:
  Enabled: false
RSpec/ContextWording:
  Enabled: false
RSpec/SpecFilePathFormat:
  Enabled: false
RSpec/IteratedExpectation:
  Enabled: false
